{% extends "base.html" %}
{% block extrahead %}
  {{ super() }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap">
  <link rel="stylesheet" href="{{ 'stylesheets/extra.css' | url }}">
{% endblock %}
{% block announce %}
  <div id="announcement" class="announcement">
    For updates connect with <strong>tyson-tswetnam</strong> on
    <a href="https://www.linkedin.com/in/tyson-swetnam/">
      <span class="twemoji linkedin">
        {% include ".icons/fontawesome/brands/linkedin.svg" %}
      </span>
      <strong>LinkedIn</strong>
    </a>
      <button id="close-announcement" class="close-button" aria-label="Close" onclick="document.getElementById('announcement').style.display='none'">&times;</button>
  </div>
{% endblock %}
{% block scripts %}
  {{ super() }}
  <script>
    // Toggle landing-page body class based on URL so navigation.instant
    // doesn't carry the class from / onto inner pages (which would hide
    // their .md-header / .md-tabs / etc.).
    (function() {
      function isLandingPath(p) {
        return p === '/' || p === '' || p === '/index.html' ||
               /\/publications\/?$/.test(p) || /\/publications\/index\.html$/.test(p);
      }
      function update() {
        document.body.classList.toggle('landing-page', isLandingPath(location.pathname));
      }
      update();
      if (typeof document$ !== 'undefined' && document$.subscribe) {
        document$.subscribe(update);
      }
      if (typeof location$ !== 'undefined' && location$.subscribe) {
        location$.subscribe(function(u) {
          document.body.classList.toggle('landing-page', isLandingPath(u.pathname));
        });
      }
    })();
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var announcement = document.getElementById('announcement');
      // Hide if previously closed
      if (localStorage.getItem('announcementClosed') === 'true') {
        if (announcement) { announcement.style.display = 'none'; }
      }
      var closeBtn = document.getElementById('close-announcement');
      if (closeBtn && announcement) {
        closeBtn.addEventListener('click', function() {
          announcement.style.display = 'none';
          localStorage.setItem('announcementClosed', 'true');
        });
      }
    });
  </script>
  <!-- LLM Widget -->
  <link rel="stylesheet" href="{{ 'assets/react/llm-widget.css' | url }}">
  <script type="module" src="{{ 'assets/react/llm-widget.js' | url }}"></script>
{% endblock %}
