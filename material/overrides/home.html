{% extends "main.html" %}

{% block extrahead %}
  {{ super() }}

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="{{ 'assets/landing/style.css' | url }}" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <style>
    /* Hide Material chrome that competes with the landing page on the homepage only.
       Sidebars, footer, announcement bar, and tabs are removed; the header (with
       brand mark, search, and palette toggle) stays. */
    .md-sidebar--primary,
    .md-sidebar--secondary { display: none !important; }
    .md-content { max-width: none !important; }
    .md-content__inner { margin: 0 !important; padding: 0 !important; }
    .md-content__inner::before { content: none !important; height: 0 !important; }
    .md-main__inner { margin-top: 0 !important; }
    .md-main { background: var(--paper); }
    .md-tabs { display: none !important; }
    #announcement { display: none !important; }
    .md-footer { display: none !important; }

    /* The React app renders its own header-spacing/typography; suppress Material's
       typography rules inside #root. */
    #root .md-content__inner > h1,
    #root .md-typeset { font-size: inherit; }

    /* Make the landing fill the page edge-to-edge. */
    body { overflow-x: hidden; }
    #root { width: 100%; }
  </style>
{% endblock %}

{% block content %}
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react" src="{{ 'assets/landing/data.jsx' | url }}"></script>
  <script type="text/babel" data-presets="env,react" src="{{ 'assets/landing/constellation.jsx' | url }}"></script>
  <script type="text/babel" data-presets="env,react" src="{{ 'assets/landing/sections.jsx' | url }}"></script>
  <script type="text/babel" data-presets="env,react" src="{{ 'assets/landing/app.jsx' | url }}"></script>
{% endblock %}

{% block footer %}{% endblock %}
