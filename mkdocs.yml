site_name: 'T.L. Swetnam'
site_description: 'professional pages for T.L. Swetnam'
site_author: 'Tyson L Swetnam'
site_url: https://tysonswetnam.com

# Repository
repo_name: tyson-swetnam
repo_url: https://github.com/tyson-swetnam/home
edit_uri: edit/main/docs/
# Copyright
copyright: 'Copyright &copy; 2019-2025 Tyson Lee Swetnam'

# Page tree
nav:
  - Home: index.md
  - Blog:
    - blog/index.md
  - Teaching:
    - Teaching: teaching.md
    - Advising & Mentoring: mentoring.md
    - Opportunities: jobs.md
  - Resources:
    - Projects & Awards:
        - Current Projects: current_projects.md
        - Previous Projects: previous_projects.md
        - Grants & Awards: awards.md
    - Groups & Societies: groups.md
    - Publications & Talks:
        - Publications: publications.md
        - ePublications: epubs.md
        - Talks: talks.md
    - Open Data Sets: data.md
    - Open Code: code.md
  - CV: cv.md

# Configuration

theme:
  name: 'material'
  custom_dir: material/overrides
  # 404 page
  static_templates:
    - 404.html
  # Don't include MkDocs' JavaScript
  include_search_page: false
  search_index_only: true
  # Default values, taken from mkdocs_theme.yml
  language: en
  palette:
    # Light mode (default) — editorial paper/ink/ochre
    - media: "(prefers-color-scheme: light)"
      scheme: tls-light
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode — same system, inverted
    - media: "(prefers-color-scheme: dark)"
      scheme: tls-dark
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font: false  # fonts loaded via extra_css (EB Garamond / Inter Tight / JetBrains Mono)
  features:
    - navigation.sections
    - navigation.expand
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
  favicon: 'assets/ua.ico'

# Options
extra:
  social:
    - icon: fontawesome/brands/orcid
      link: https://orcid.org/0000-0002-6639-7181
    - icon: simple/googlescholar  
      link: https://scholar.google.com/citations?user=nanIeAYAAAAJ&hl=en
    - icon: fontawesome/brands/github
      link: https://github.com/tyson-swetnam/
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/tswetnam
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/tyson-swetnam
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/u/tswetnam
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/channel/UC5xPt9KZHccC0ehMNEkINzQ
  analytics:
    provider: google
    property: G-NYETZFD8DN
  
# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap
  - https://unpkg.com/leaflet/dist/leaflet.css
  - https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css
  - https://unpkg.com/leaflet.awesome-markers@2.0.5/dist/leaflet.awesome-markers.css
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/leaflet/dist/leaflet.js
  - https://api.mapbox.com/mapbox.js/plugins/leaflet-fullscreen/v1.0.1/Leaflet.fullscreen.min.js
  - https://unpkg.com/leaflet.awesome-markers@2.0.5/dist/leaflet.awesome-markers.min.js
 
plugins:
    - blog:
        blog_dir: ./blog
        post_date_format: full
        archive: false
        archive_name: archive
        archive_url_format: "archive/{date}"
        archive_date_format: MMMM yyyy
        archive_toc: true
        post_url_format: "{date}/{slug}"
    - search
    - mkdocstrings
    - git-revision-date
