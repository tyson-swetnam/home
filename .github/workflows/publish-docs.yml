name: Build editorial-redesign preview
on:
  push:
    branches:
      - editorial-redesign
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install mkdocs-material and plugins
        run: pip install mkdocs-material mkdocs-git-revision-date-plugin mkdocstrings mkdocstrings-python-legacy pymdown-extensions
      - name: Build site
        run: mkdocs build --site-dir site
      - uses: actions/upload-artifact@v4
        with:
          name: editorial-redesign-site
          path: site
          retention-days: 14
